name: Release

on:
  push:
    branches: [main]
    paths:
      - "FaceDiff/FaceDiff.csproj"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Compare project version to previous commit
        id: version
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $csproj = "FaceDiff/FaceDiff.csproj"

          $current = (dotnet msbuild $csproj -getProperty:Version -nologo).Trim()
          if ([string]::IsNullOrWhiteSpace($current)) {
            Write-Error "FaceDiff.csproj has no <Version>; add one to enable releases."
          }

          # No parent commit, missing file in parent, or no <Version> before → treat as no previous version.
          $prev = ""
          git rev-parse --verify HEAD~1 2>$null | Out-Null
          if ($LASTEXITCODE -eq 0) {
            $prevPath = "FaceDiff/FaceDiff.prev.csproj"
            $prevContent = git show HEAD~1:$csproj 2>$null
            if ($LASTEXITCODE -eq 0 -and $prevContent) {
              try {
                $prevContent | Set-Content -Path $prevPath -Encoding utf8
                $prev = (dotnet msbuild $prevPath -getProperty:Version -nologo).Trim()
              } catch {
                $prev = ""
              } finally {
                Remove-Item $prevPath -ErrorAction SilentlyContinue
              }
            }
          }
          if ([string]::IsNullOrWhiteSpace($prev)) { $prev = "" }

          Write-Host "Current Version: $current"
          Write-Host "Previous Version: $(if ($prev) { $prev } else { '(none)' })"

          # Skip only when we know the previous commit had the same non-empty version.
          $unchanged = ($prev -ne "") -and ($current -eq $prev)
          if ($unchanged) {
            Write-Host "Version unchanged; skipping build and release."
            echo "changed=false" >> $env:GITHUB_OUTPUT
            exit 0
          }

          echo "changed=true" >> $env:GITHUB_OUTPUT
          echo "version=$current" >> $env:GITHUB_OUTPUT

      - name: Publish Release build
        if: steps.version.outputs.changed == 'true'
        shell: pwsh
        run: |
          $v = "${{ steps.version.outputs.version }}"
          $out = Join-Path $PWD "publish"
          dotnet publish FaceDiff/FaceDiff.csproj `
            -c Release `
            -o $out `
            -p:Version=$v `
            --verbosity minimal

      - name: Zip artifact
        if: steps.version.outputs.changed == 'true'
        shell: pwsh
        run: |
          $v = "${{ steps.version.outputs.version }}"
          $zip = "FaceDiff-$v.zip"
          Compress-Archive -Path "publish\*" -DestinationPath $zip -Force
          echo "ZIP_NAME=$zip" >> $env:GITHUB_ENV

      - name: Create GitHub Release
        if: steps.version.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: FaceDiff v${{ steps.version.outputs.version }}
          files: ${{ env.ZIP_NAME }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
